name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          pytest -q backend/tests
      - name: Execute methods notebook (optional)
        if: always()
        run: |
          python -m pip install nbconvert jupyter
          jupyter nbconvert --to notebook --execute docs/methods_notebook.ipynb --ExecutePreprocessor.timeout=120

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend
        run: |
          cd frontend
          npm ci
      - name: Run lint
        run: |
          cd frontend
          npm run lint || true

  gpu-tests:
    # GPU tests will only run on self-hosted runners with CUDA
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - name: Check for NVIDIA
        id: nvidia
        run: |
          if command -v nvidia-smi >/dev/null 2>&1; then echo "has_nvidia=true" >> $GITHUB_OUTPUT; else echo "has_nvidia=false" >> $GITHUB_OUTPUT; fi
      - name: Install backend deps
        if: steps.nvidia.outputs.has_nvidia == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || true
      - name: Run GPU tests
        if: steps.nvidia.outputs.has_nvidia == 'true'
        run: |
          cd backend && pytest -q -k "gpu" || true
