name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          # Default CI excludes GPU tests (these require CUDA/self-hosted runners).
          cd backend
          pytest -q tests -k "not gpu" --maxfail=1

# Note:
# - The MoonStone frontend depends on StarDust via a local workspace path (see frontend/package.json).
#   That layout is convenient for local dev in a multi-repo workspace, but GitHub Actions checks out
#   only this repo by default.
# - We keep CI focused on backend correctness here; StarDust/MoonStone UI integration tests remain
#   opt-in via env flags in pytest and can be run in a dedicated workflow or in a mono-workspace CI.
