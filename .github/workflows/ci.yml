name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          # Default CI excludes GPU tests (these require CUDA/self-hosted runners).
          cd backend
          pytest -q tests -k "not gpu" --maxfail=1

  lint-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend
        run: |
          cd frontend
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Run lint
        run: |
          cd frontend
          npm run lint || true

  build-stardust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and build StarDust frontend
        run: |
          cd StarDust/frontend
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
      - name: Run npm audit (report only)
        run: |
          cd StarDust/frontend
          npm audit --json > audit.json || true
          python - <<'PY'
import json
d=json.load(open('audit.json'))
v=d.get('metadata', {}).get('vulnerabilities', {})
print('npm audit vulnerability summary:', v)
PY

  gpu-tests:
    # GPU tests will only run on self-hosted runners with CUDA
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - name: Check for NVIDIA
        id: nvidia
        run: |
          if command -v nvidia-smi >/dev/null 2>&1; then echo "has_nvidia=true" >> $GITHUB_OUTPUT; else echo "has_nvidia=false" >> $GITHUB_OUTPUT; fi
      - name: Install backend deps
        if: steps.nvidia.outputs.has_nvidia == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || true
      - name: Run GPU tests
        if: steps.nvidia.outputs.has_nvidia == 'true'
        run: |
          cd backend && pytest -q -k "gpu" || true
