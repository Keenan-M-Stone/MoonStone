name: GPU Tests (self-hosted)

on:
  workflow_dispatch:

jobs:
  gpu-tests:
    # Requires a self-hosted runner with CUDA available.
    runs-on: [self-hosted, linux]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Check for NVIDIA
        id: nvidia
        run: |
          if command -v nvidia-smi >/dev/null 2>&1; then echo "has_nvidia=true" >> $GITHUB_OUTPUT; else echo "has_nvidia=false" >> $GITHUB_OUTPUT; fi
      - name: Set up Python
        if: steps.nvidia.outputs.has_nvidia == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        if: steps.nvidia.outputs.has_nvidia == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run GPU tests
        if: steps.nvidia.outputs.has_nvidia == 'true'
        run: |
          cd backend
          pytest -q -k "gpu"
      - name: No GPU detected
        if: steps.nvidia.outputs.has_nvidia != 'true'
        run: |
          echo "No NVIDIA GPU detected on this runner; skipping."
